appId: com.hismindset.hissoundboard
productName: HISSOUNDBOARD
directories:
  output: release
  buildResources: resources

# No native module needs recompiling: uiohook-napi ships ABI-stable N-API
# prebuilds. Skipping the rebuild avoids @electron/rebuild's node-abi lag on new
# Electron releases (e.g. Electron 42) and keeps cross-platform builds working.
npmRebuild: false

files:
  - dist/**/*
  - resources/**/*
  - remote/**/*
  - package.json
  # Native modules are automatically handled, but we can be explicit if needed
  # - node_modules/**/* # usually not needed as builder handles dependencies
  # IMPORTANT: drop the host-compiled native binary so node-gyp-build falls back
  # to the correct prebuilds/<platform>-<arch>. Without this, a macOS build/Release
  # binary gets loaded first on Linux/Windows and crashes (cross-build safety).
  - "!node_modules/uiohook-napi/build/**"
  - "!node_modules/uiohook-napi/bin/**"

# Unpack native modules
asarUnpack:
  - "**/*.node"
  - "**/uiohook-napi/**"

mac:
  target: dmg
  icon: resources/icon.icns
  # CRITICAL: Disable signing as requested
  identity: null
  entitlements: entitlements.plist
  entitlementsInherit: entitlements.plist
  # For Apple Silicon, ad-hoc signing is required. builder does this automatically if identity is null.
  hardenedRuntime: false
  gatekeeperAssess: false
  # Required so macOS shows the microphone permission prompt for the soundboard passthrough.
  extendInfo:
    NSMicrophoneUsageDescription: "HISSOUNDBOARD routes your microphone into voice chat together with your sounds."

dmg:
  sign: false

win:
  target: nsis
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: HISSOUNDBOARD

linux:
  target: AppImage
  icon: resources/icon.png
  category: Audio

# Publish configuration (for GitHub Actions)
publish:
  provider: github
  owner: hismindset
  repo: hissoundboard
