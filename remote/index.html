<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OpenSoundBoard Remote</title>
    <style>
        :root {
            --bg-color: #0d0e1f;
            --surface-color: #1a1b2e;
            --surface-highlight: #25263a;
            --accent-color: #8b5cf6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: calc(12px + var(--safe-area-top)) 16px 12px;
            background: var(--surface-color);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .status {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status.connected { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status.disconnected { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* PAGE NAVIGATION */
        .page-tabs {
            display: flex;
            padding: 8px 16px;
            gap: 8px;
            overflow-x: auto;
            flex-shrink: 0;
            background: var(--bg-color);
            scrollbar-width: none;
        }
        .page-tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--surface-color);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        /* GRID */
        .grid-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
        }

        .cell {
            background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            user-select: none;
        }
        .cell:active { transform: scale(0.96); }
        .cell.has-sound { background: linear-gradient(145deg, var(--surface-highlight), var(--surface-color)); }
        .cell.active { border-color: var(--accent-color); box-shadow: inset 0 0 20px rgba(139,92,246,0.2); }

        .cell-label {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .numpad-hint {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
            font-family: monospace;
        }

        /* PANIC BAR */
        .panic-bar {
            padding: 16px;
            padding-bottom: calc(16px + var(--safe-area-bottom));
            background: var(--surface-color);
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .panic-btn {
            width: 100%;
            padding: 14px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        .panic-btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 700; letter-spacing: -0.5px;">Remote Control</div>
        <div id="status" class="status disconnected">Disconnected</div>
    </div>

    <div id="pageTabs" class="page-tabs">
        <!-- Tabs injected here -->
    </div>

    <div class="grid-container">
        <div id="grid" class="grid">
            <!-- Cells injected here -->
        </div>
    </div>

    <div class="panic-bar">
        <button class="panic-btn" onclick="sendPanic()">STOP ALL SOUNDS</button>
    </div>

    <script>
        const NUMPAD_MAP = [7, 8, 9, 4, 5, 6, 1, 2, 3];
        let ws;
        let state = {
            pages: [],
            activePageId: '',
            sounds: [] // { pageId, slot, sound }
        };
        let selectedPageId = '';

        function connect() {
            updateStatus('Connecting...', 'disconnected');
            ws = new WebSocket(`ws://${location.host}`);

            ws.onopen = () => {
                updateStatus('Connected', 'connected');
                // Request initial state on connect
                ws.send(JSON.stringify({ type: 'request-sounds' }));
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'sounds-update') {
                        // msg.sounds actually contains { pages, activePageId, sounds }
                        const payload = msg.sounds;
                        
                        if (payload.pages) {
                            state.pages = payload.pages;
                            state.activePageId = payload.activePageId;
                            state.sounds = payload.sounds || [];
                            
                            // If no page selected yet, or selected page was deleted, select active
                            if (!selectedPageId || !state.pages.find(p => p.id === selectedPageId)) {
                                selectedPageId = state.activePageId || (state.pages[0] ? state.pages[0].id : '');
                            }
                            
                            renderTabs();
                            renderGrid();
                        }
                    }
                } catch (e) {
                    console.error("Parse error", e);
                }
            };

            ws.onclose = () => {
                updateStatus('Disconnected', 'disconnected');
                setTimeout(connect, 2000);
            };
        }

        function updateStatus(text, cls) {
            const el = document.getElementById('status');
            el.textContent = text;
            el.className = `status ${cls}`;
        }

        function renderTabs() {
            const container = document.getElementById('pageTabs');
            container.innerHTML = '';
            
            state.pages.forEach(page => {
                const btn = document.createElement('div');
                btn.className = `tab ${page.id === selectedPageId ? 'active' : ''}`;
                btn.textContent = page.name || 'Untitled';
                btn.onclick = () => {
                    selectedPageId = page.id;
                    renderTabs();
                    renderGrid();
                };
                container.appendChild(btn);
            });

            if (state.pages.length === 0) {
                container.innerHTML = '<div class="tab">No Pages</div>';
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';

            const pageSounds = state.sounds.filter(s => s.pageId === selectedPageId);

            for (let i = 0; i < 9; i++) {
                const slotIndex = i;
                const soundEntry = pageSounds.find(s => s.slot === slotIndex);
                
                const cell = document.createElement('div');
                cell.className = `cell ${soundEntry ? 'has-sound' : ''}`;
                
                const numHint = document.createElement('div');
                numHint.className = 'numpad-hint';
                numHint.textContent = NUMPAD_MAP[i];
                cell.appendChild(numHint);

                if (soundEntry) {
                    const label = document.createElement('div');
                    label.className = 'cell-label';
                    label.textContent = soundEntry.sound.displayName;
                    cell.appendChild(label);

                    cell.onclick = () => {
                        triggerSound(slotIndex);
                        // Feedback
                        cell.style.borderColor = 'var(--accent-color)';
                        setTimeout(() => cell.style.borderColor = '', 200);
                    };
                }

                container.appendChild(cell);
            }
        }

        function triggerSound(slot) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                type: 'play-sound',
                pageId: selectedPageId,
                slot: slot
            }));
        }

        function sendPanic() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                type: 'play-sound',
                pageId: '__PANIC__',
                slot: -1
            }));
        }

        // Init
        connect();

    </script>
</body>
</html>
