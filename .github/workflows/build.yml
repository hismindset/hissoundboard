name: Build OpenSoundBoard

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
          - os: macos-latest
            platform: darwin
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux: install system dependencies for uiohook-napi and RPM maker
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libevdev-dev \
            libasound2-dev \
            libx11-dev \
            libxtst-dev \
            libpng-dev \
            libxkbcommon-x11-dev \
            rpm \
            dpkg \
            fakeroot

      # Windows: ensure Visual Studio build tools are available
      - name: Setup MSVC (Windows)
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci
        env:
          # Prevent interactive prompts
          CI: true

      - name: Make distributables (Windows/Linux)
        if: matrix.platform != 'darwin'
        run: npm run make
        env:
          CI: true

      - name: Make distributables (macOS)
        if: matrix.platform == 'darwin'
        run: npm run make -- --arch=universal
        env:
          CI: true
          # Disable code signing on CI
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opensoundboard-${{ matrix.platform }}
          path: out/make/**/*
          retention-days: 30
