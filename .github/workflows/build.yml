name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        # Use npm ci for clean install using package-lock.json

      - name: Run Tests (placeholder)
        run: echo "No tests configured yet"

      - name: Build & Package
        run: npm run dist -- --publish never

      - name: Upload Artifacts (Linux/Windows)
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            release/*.exe
            release/*.AppImage

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: release/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      
      - name: Display structure of downloaded files
        run: ls -R
      
      # Since electron-builder's "publish: github" in the build step usually handles creating the release and uploading assets,
      # we might rely on that. However, running it on multiple matrix jobs "publish" typically uploads to the draft or creates it.
      # If we want to use softprops/action-gh-release to be explicit:
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos-artifacts/*.dmg
            windows-latest-artifacts/*.exe
            ubuntu-latest-artifacts/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
